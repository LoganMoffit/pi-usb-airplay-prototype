// Snippet for shairport-sync pipe backend.
// Include into /etc/shairport-sync.conf (or conf.d if supported).

general = {
  name = "Pi USB AirPlay";
};

sessioncontrol = {
  run_this_before_play_begins = "/bin/mkdir -p /tmp/shairport";
};

pipe = {
  name = "/tmp/shairport/airplay.pcm";
  audio_backend_buffer_desired_length_in_seconds = 0.25;
  audio_backend_latency_offset_in_seconds = 0.0;
};

alsa = {
  output_device = "default";
};

// Force output through pipe backend for this prototype.
output_backend = "pipe";
